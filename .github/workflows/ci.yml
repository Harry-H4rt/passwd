name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - run: go test ./...

  clients:
    name: TS clients
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/package-lock.json
      # npm ci runs the extension's "prepare" (wxt prepare), generating the
      # .wxt types that typecheck depends on.
      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      - run: npm test --workspaces --if-present
      - run: npm run build -w @passwd/web
      - run: npm run build -w @passwd/extension

name: Desktop release

# Builds the standalone Tauri desktop vault for Linux, macOS (Apple silicon +
# Intel) and Windows, then attaches the bundles to a GitHub Release.
#
# Triggers:
#   - pushing a tag like v0.1.0
#   - manual run (workflow_dispatch) -> publishes a draft release for the
#     version in src-tauri/tauri.conf.json
#
# Code signing is OFF by default so this runs on a fresh repo. To produce
# signed/notarized builds, add the secrets noted in the env block below; the
# steps pick them up automatically once present.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: ${{ matrix.label }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple silicon)
            platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - label: macOS (Intel)
            platform: macos-latest
            rust-targets: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --bundles app,dmg"
          - label: Linux
            platform: ubuntu-22.04
            rust-targets: ""
            args: "--bundles appimage,deb"
          - label: Windows
            platform: windows-latest
            rust-targets: ""
            args: "--bundles msi,nsis"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: clients/apps/desktop/src-tauri -> target

      # Installs the whole clients workspace so the desktop app's frontend
      # (beforeBuildCommand: npm run build) can resolve @passwd/crypto.
      - name: Install JS dependencies
        working-directory: clients
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS signing + notarization (set these as repo secrets) ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # --- Windows code signing (Tauri reads these for signtool) ---
          # Provide a cert and configure tauri.conf.json > bundle.windows when ready.
        with:
          projectPath: clients/apps/desktop
          tagName: v__VERSION__
          releaseName: "passwd v__VERSION__"
          releaseBody: "Standalone offline desktop vault. See the assets below for your platform."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
